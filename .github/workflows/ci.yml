name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: lint + test (ubuntu, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.5.x"
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}

      - name: Sync dependencies (dev + train + label + tui + embed + langgraph)
        run: uv sync --extra dev --extra train --extra label --extra tui --extra embed --extra langgraph

      - name: Lint (ruff)
        run: uv run --no-sync ruff check .

      - name: Test (default subset)
        run: >-
          uv run --no-sync pytest
          -m "not torch and not fastai and not dali and not nvidia and not slow"
          -v --tb=short
